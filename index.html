<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./styles/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Rubik:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">
  <script type="module" src="./script/app.js"></script>
  <title>Frontend Mentor | Tip calculator app</title>

</head>

<body>
  <section class="logo">
    <img src="images/logo.svg" alt="image of the logo" class="logo__img">
  </section>
  <div class="container">
    <section class="options">
      <h3 class="options__bill__title">Bill</h3>
      <div class="options__bill__input-container">
        <input id="bill-input" type="number" class="options__bill__input" placeholder="0">
      </div>
      <h3 class="options__tip__title"> Select Tip %
      </h3>
      <div class="options__tip__grid">
        <button class="active">5%</button>
        <button>10%</button>
        <button>15%</button>
        <button>25%</button>
        <button>50%</button>
        <input type="number" id="custom-tip" min="0" max="100" placeholder="Custom">
      </div>
      <h3 class="options__person-number__title"> Number of People
      </h3>
      <div class="options__person-number__input-container">
        <input id="people-number" type="number" class="options__person-number__input" placeholder="0">
        <span id="error-message"></span>
      </div>
    </section>

    <section class="results">
      <div id="results__tip-amount" class="result">
        <div id="results__tip-amount__header">
          <h3 id="results__tip-amount__header__title"> Tip Amount
          </h3>
          <p id="results__tip-amount__header__subtitle"> / person
          </p>
        </div>
        <h2 id="tip-amount-value" class="value">$0.00</h2>
      </div>

      <div id="results__tip-total" class="result">
        <div id="results__tip-total__header">
          <h3 id="results__tip-total__header__title"> Total

          </h3>
          <p> / person</p>
        </div>
        <h2 id="tip-total-value" class="value">$0.00</h2>
      </div>
      <button class="btn-reset">Reset</button>
    </section>
  </div>

</body>

</html>
